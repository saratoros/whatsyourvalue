# Deploy Vite dist/ to GitHub Pages (single job).
#
# Settings → Pages → Build: GitHub Actions (not “Deploy from a branch”).
#
# Node 24 for JavaScript-based actions (see GitHub changelog 2025-09-19); app build still uses setup-node.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # #region agent log (H2/H5: runner + action-runtime flags)
      - name: Diagnostics
        run: |
          {
            echo "## CI diagnostics"
            echo "- RUNNER_OS: $RUNNER_OS"
            echo "- FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: $FORCE_JAVASCRIPT_ACTIONS_TO_NODE24"
            echo "- GITHUB_REPOSITORY: $GITHUB_REPOSITORY"
            echo "- default node (runner): $(command -v node >/dev/null && node -v || echo none)"
          } >> "$GITHUB_STEP_SUMMARY"
      # #endregion

      - uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'
        run: npm ci

      - name: Build
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'
          VITE_BASE: ${{ endsWith(github.event.repository.name, '.github.io') && '/' || format('/{0}/', github.event.repository.name) }}
        run: |
          set -eux
          echo "VITE_BASE=$VITE_BASE"
          npm run build
          test -f dist/index.html
          du -sh dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
